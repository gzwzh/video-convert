name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-macos.yml"
      - "package.json"
      - "package-lock.json"
      - "electron-builder.multi-platform.js"
      - "electron/**"
      - "src/**"
      - "build/**"
      - "public/**"
      - "vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon
        shell: bash
        run: |
          rm -rf build/icon.iconset build/icon.icns
          mkdir -p build/icon.iconset
          sips -z 16 16 build/icon.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 build/icon.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 build/icon.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 build/icon.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 build/icon.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 build/icon.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 build/icon.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_512x512.png
          cp build/icon.png build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Build macOS package
        run: npm run build:mac:${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify packaged app contents
        shell: bash
        run: |
          set -euo pipefail
          ZIP_PATH=$(find release_build_multi_platform -maxdepth 1 -name "*-mac-${{ matrix.arch }}.zip" | head -n 1)
          if [ -z "${ZIP_PATH:-}" ]; then
            echo "No macOS zip artifact found for ${{ matrix.arch }}"
            exit 1
          fi
          VERIFY_DIR="release_build_multi_platform/verify-${{ matrix.arch }}"
          rm -rf "$VERIFY_DIR"
          mkdir -p "$VERIFY_DIR"
          ditto -x -k "$ZIP_PATH" "$VERIFY_DIR"
          APP_PATH=$(find "$VERIFY_DIR" -maxdepth 2 -name "*.app" | head -n 1)
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app bundle found after unzip"
            exit 1
          fi
          echo "Verified app bundle: $APP_PATH"
          find "$APP_PATH/Contents/Resources" -maxdepth 4 \( -name "ffmpeg" -o -name "ffprobe" -o -name "main.js" \) -print
          find "$APP_PATH/Contents/Resources" -maxdepth 6 -name "ffmpeg" | grep -q .
          find "$APP_PATH/Contents/Resources" -maxdepth 6 -name "ffprobe" | grep -q .
          test -f "$APP_PATH/Contents/Resources/app.asar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 视频转换助手-macos-${{ matrix.arch }}
          path: release_build_multi_platform/*-mac-${{ matrix.arch }}.zip
          if-no-files-found: error
